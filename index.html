<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Willkommen auf meiner Seite</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.3rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            margin: 40px auto;
            width: 80%;
            max-width: 500px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
        }

        a.button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #2575fc;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        a.button:hover {
            background: #e6e6e6;
        }
    </style>
</head>
<body>

    <header>
        <h1>Hallo Welt!</h1>
        <p>Willkommen auf meiner ersten richtig schönen HTML‑Seite.</p>
    </header>

    <div class="card">
        <h2>Über mich</h2>
        <p>Hier kannst du etwas über dich schreiben oder ein Projekt vorstellen.</p>
        <a class="button" href="#">Mehr erfahren</a>
    </div>

</body>
</html>
